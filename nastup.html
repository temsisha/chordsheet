<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChordSheet — Nastup</title>
<style>
  :root {
    --bg: #121212;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: #2e2e2e;
    --text: #ffffff;
    --text-muted: #888;
    --accent: #328EFC;
    --accent-hover: #1a7de8;
    --accent-dim: rgba(50,142,252,0.15);
    --danger: #e84040;
    --success: #3dba6f;
    --warning: #f0a500;
    --font-mono: 'Consolas', 'Courier New', monospace;
    --font-ui: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  /* Setlist nav */
  .nav-group { display: flex; align-items: center; gap: 6px; }
  .nav-btn {
    width: 36px; height: 36px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.13s; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-counter {
    font-family: var(--font-mono); font-size: 0.78rem;
    color: var(--text-muted); min-width: 36px; text-align: center;
  }

  /* Song info */
  .song-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .song-title {
    font-family: var(--font-mono); font-size: 1.05rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ton-chip {
    font-family: var(--font-mono); font-size: 0.72rem;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(50,142,252,0.3); border-radius: 10px;
    padding: 3px 10px; white-space: nowrap; flex-shrink: 0;
  }

  /* Controls */
  .ctrl-group { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .ctrl-btn {
    padding: 6px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text-muted); cursor: pointer;
    font-size: 0.78rem; font-family: var(--font-ui); transition: all 0.13s;
    white-space: nowrap;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ctrl-btn.home { border-color: rgba(255,255,255,0.08); text-decoration: none; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .ctrl-btn.home:hover { border-color: var(--accent); color: var(--accent); }
  .speed-wrap { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-muted); }
  .speed-wrap input[type=range] { width: 70px; accent-color: var(--accent); cursor: pointer; }

  /* ── MAIN LAYOUT ── */
  .app { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* ── LYRICS PANEL ── */
  .lyrics-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
    scroll-behavior: smooth;
    display: flex;
    justify-content: center;
  }
  .lyrics-inner {
    max-width: 860px;
    width: 100%;
  }
  .lyric-line {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    min-height: 3em;
    margin-bottom: 4px;
  }
  .lyric-line.empty-line { min-height: 1.2em; }
  .word-unit {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    margin-right: 10px;
  }
  .chord-label {
    font-size: 0.88rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-mono);
    white-space: nowrap;
    line-height: 1.5;
    visibility: hidden;
    margin-bottom: 2px;
  }
  .chord-label.has-chord { visibility: visible; }
  .word-text {
    font-family: var(--font-mono);
    color: var(--text);
    white-space: nowrap;
  }

  /* font size control */
  #lyricsInner { transition: font-size 0.2s; }

  /* empty state */
  .lyrics-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 14px;
    color: var(--text-muted); text-align: center;
    font-size: 0.9rem;
  }
  .lyrics-empty .big { font-size: 2.5rem; opacity: 0.2; }

  /* ── ORDERS PANEL ── */
  .orders-panel {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .orders-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .orders-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; flex: 1; }
  .orders-badge {
    background: var(--accent); color: #fff;
    font-size: 0.65rem; font-weight: 700;
    border-radius: 10px; padding: 2px 8px;
    font-family: var(--font-mono);
  }
  .orders-badge.zero { background: var(--bg3); color: var(--text-muted); }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
    animation: blink 2s infinite;
  }
  .conn-dot.off { background: var(--danger); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .orders-actions {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .ord-action-btn {
    flex: 1; padding: 6px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: none;
    color: var(--text-muted); cursor: pointer; font-size: 0.72rem;
    font-family: var(--font-ui); transition: all 0.13s; text-align: center;
  }
  .ord-action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ord-action-btn.primary:hover { background: var(--accent-hover); }
  .ord-action-btn:hover:not(.primary) { border-color: var(--accent); color: var(--accent); }

  .orders-list {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 7px;
    min-height: 0;
  }

  /* Order card */
  .ord-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
  .ord-card.in-db   { border-color: rgba(50,142,252,0.5); }
  .ord-card.not-in-db { border-color: rgba(232,64,64,0.5); }

  .ord-song {
    font-family: var(--font-mono); font-size: 0.88rem; font-weight: 700;
    margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ord-guest { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
  .ord-guest span { color: var(--accent); }
  .ord-no-db { font-size: 0.65rem; color: var(--danger); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .ord-msg { font-size: 0.75rem; color: var(--text-muted); font-style: italic; margin-bottom: 7px; padding: 5px 8px; background: var(--bg2); border-radius: 5px; border-left: 2px solid var(--accent); line-height: 1.4; }
  .ord-time { font-size: 0.62rem; color: #3a3a3a; font-family: var(--font-mono); margin-bottom: 7px; }
  .ord-btns { display: flex; gap: 4px; }
  .ord-btn {
    flex: 1; padding: 5px 6px; border-radius: 6px;
    border: 1px solid var(--border); background: none;
    color: var(--text-muted); cursor: pointer; font-size: 0.7rem;
    font-family: var(--font-ui); transition: all 0.12s; text-align: center;
  }
  .ord-btn.open { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ord-btn.open:hover { background: var(--accent-hover); }
  .ord-btn.done:hover { border-color: var(--success); color: var(--success); }
  .ord-btn.del:hover { border-color: var(--danger); color: var(--danger); }

  .orders-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: var(--text-muted);
    text-align: center; padding: 20px; font-size: 0.8rem;
  }
  .orders-empty .e-icon { font-size: 2rem; opacity: 0.2; }

  /* ── NOTIFICATION POPUP ── */
  .notif-popup {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: var(--bg2); border: 2px solid var(--accent);
    border-radius: 14px; padding: 14px 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.7);
    z-index: 600; min-width: 280px; max-width: 380px;
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    pointer-events: none;
  }
  .notif-popup.show { transform: translateX(-50%) translateY(0); pointer-events: all; }
  .notif-popup.not-in-db { border-color: var(--danger); }
  .notif-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
  .notif-song { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .notif-popup.not-in-db .notif-song { color: var(--danger); }
  .notif-guest { font-size: 0.8rem; color: var(--text-muted); }
  .notif-msg { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 4px; }
  .notif-noDb { font-size: 0.7rem; font-weight: 700; color: var(--danger); text-transform: uppercase; margin-top: 5px; }
  .notif-btns { display: flex; gap: 6px; margin-top: 12px; }
  .notif-btn {
    flex: 1; padding: 7px; border-radius: 7px;
    border: 1px solid var(--border); background: none;
    color: var(--text-muted); cursor: pointer; font-size: 0.78rem;
    font-family: var(--font-ui); transition: all 0.12s; text-align: center;
  }
  .notif-btn.open { background: var(--accent); border-color: var(--accent); color: #fff; }
  .notif-btn.open:hover { background: var(--accent-hover); }

  /* ── QR MODAL ── */
  .qr-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center; z-index: 700;
  }
  .qr-overlay.show { display: flex; }
  .qr-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; max-width: 320px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform:scale(0.9); opacity:0; } to { transform:none; opacity:1; } }
  .qr-box h2 { font-family: var(--font-mono); font-size: 0.95rem; margin-bottom: 6px; }
  .qr-box p { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 16px; }
  #qrCanvas { border-radius: 10px; background: #fff; padding: 10px; margin: 0 auto 12px; display: block; }
  .qr-url { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; font-family: var(--font-mono); font-size: 0.68rem; color: var(--accent); word-break: break-all; margin-bottom: 14px; cursor: pointer; }
  .qr-btns { display: flex; gap: 8px; justify-content: center; }
  .qr-btn { padding: 7px 16px; border-radius: 7px; border: 1px solid var(--border); background: none; color: var(--text-muted); cursor: pointer; font-size: 0.78rem; font-family: var(--font-ui); transition: all 0.13s; }
  .qr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qr-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <!-- Setlist nav -->
  <div class="nav-group">
    <button class="nav-btn" id="prevBtn" onclick="navPrev()" disabled>◀</button>
    <span class="nav-counter" id="navCounter">—</span>
    <button class="nav-btn" id="nextBtn" onclick="navNext()" disabled>▶</button>
  </div>

  <!-- Song info -->
  <div class="song-info">
    <span class="song-title" id="songTitle">Izaberi setlistu →</span>
    <span class="ton-chip" id="tonChip" style="display:none"></span>
  </div>

  <!-- Controls -->
  <div class="ctrl-group">
    <!-- Font size -->
    <button class="ctrl-btn" onclick="changeFontSize(-1)" title="Manji font">A−</button>
    <button class="ctrl-btn" onclick="changeFontSize(+1)" title="Veći font">A+</button>

    <!-- Auto scroll -->
    <div class="speed-wrap">
      <span>🐢</span>
      <input type="range" id="speedSlider" min="1" max="10" value="4" oninput="scrollSpeed=parseInt(this.value)">
      <span>🐇</span>
    </div>
    <button class="ctrl-btn" id="scrollBtn" onclick="toggleScroll()">▶ Scroll</button>

    <!-- Setlist picker -->
    <select id="setlistSelect" onchange="onSetlistChange()" style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-ui);font-size:0.78rem;padding:6px 10px;outline:none;cursor:pointer;">
      <option value="">— Setlista —</option>
    </select>

    <a href="editor.html" class="ctrl-btn home">📝 Editor</a>
    <a href="index.html" class="ctrl-btn home">🏠</a>
  </div>
</header>

<div class="app">
  <!-- LYRICS -->
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-inner" id="lyricsInner" style="font-size:1.15rem;line-height:3.2">
      <div class="lyrics-empty">
        <div class="big">🎸</div>
        <div>Izaberi setlistu gore<br>ili otvori Editor i dodaj pesme</div>
      </div>
    </div>
  </div>

  <!-- ORDERS -->
  <aside class="orders-panel">
    <div class="orders-header">
      <span class="orders-title">🎵 Narudžbine</span>
      <span class="orders-badge zero" id="ordBadge">0</span>
      <div class="conn-dot off" id="connDot" title="Status veze"></div>
    </div>
    <div class="orders-actions">
      <button class="ord-action-btn primary" onclick="publishSongs(this)">⬆ Objavi</button>
      <button class="ord-action-btn" onclick="showQR()">📱 QR</button>
      <button class="ord-action-btn" onclick="clearAll()">🗑</button>
    </div>
    <div class="orders-list" id="ordersList">
      <div class="orders-empty">
        <div class="e-icon">🎵</div>
        <p>Nema narudžbina<br>Čekamo goste...</p>
      </div>
    </div>
  </aside>
</div>

<!-- Notification popup -->
<div class="notif-popup" id="notifPopup">
  <div class="notif-label">🔔 Nova narudžbina!</div>
  <div class="notif-song" id="notifSong"></div>
  <div class="notif-guest" id="notifGuest"></div>
  <div class="notif-msg" id="notifMsg" style="display:none"></div>
  <div class="notif-noDb" id="notifNoDb" style="display:none">⚠ NEMA U BAZI</div>
  <div class="notif-btns">
    <button class="notif-btn" onclick="hideNotif()">Zatvori</button>
    <button class="notif-btn open" id="notifOpenBtn" onclick="notifOpen()">🎸 Otvori pesmu</button>
  </div>
</div>

<!-- QR Modal -->
<div class="qr-overlay" id="qrOverlay" onclick="if(event.target===this)hideQR()">
  <div class="qr-box">
    <h2>📱 QR za narudžbine</h2>
    <p>Postavi na sto — gosti skeniraju i naručuju</p>
    <canvas id="qrCanvas" width="200" height="200"></canvas>
    <div class="qr-url" id="qrUrl" onclick="copyUrl()">učitavanje...</div>
    <div class="qr-btns">
      <button class="qr-btn" onclick="hideQR()">Zatvori</button>
      <button class="qr-btn primary" onclick="downloadQR()">⬇ Preuzmi</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, onChildAdded, remove, update, set, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase ──
const app = initializeApp({
  apiKey: "AIzaSyAiFgVGRD6VC1NX1k5ndjn-q8m0Wq9b074",
  authDomain: "chordsheet-c9de5.firebaseapp.com",
  databaseURL: "https://chordsheet-c9de5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "chordsheet-c9de5",
  storageBucket: "chordsheet-c9de5.appspot.com",
  messagingSenderId: "1234567890",
  appId: "placeholder"
});
const db = getDatabase(app);

// ── Load data from ChordSheet localStorage ──
const STORAGE_KEY = 'chordsheet_v2';
let songs = [], setlists = [];

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    songs = d.songs || [];
    setlists = d.setlists || [];
    populateSetlistSelect();
  } catch(e) {}
}

function populateSetlistSelect() {
  const sel = document.getElementById('setlistSelect');
  // keep first option
  while (sel.options.length > 1) sel.remove(1);
  setlists.forEach(sl => {
    const opt = document.createElement('option');
    opt.value = sl.id;
    opt.textContent = sl.name + ' (' + sl.entries.length + ')';
    sel.appendChild(opt);
  });
  // Auto-select if only one
  if (setlists.length === 1) {
    sel.value = setlists[0].id;
    loadSetlist(setlists[0].id);
  }
}

// ── Setlist playback ──
let activeSetlist = null;
let activeIdx = 0;
let scrollTimer = null;
let scrollActive = false;
window.scrollSpeed = 4;
let fontSize = 1.15;

window.onSetlistChange = function() {
  const id = parseInt(document.getElementById('setlistSelect').value);
  if (id) loadSetlist(id);
};

function loadSetlist(id) {
  activeSetlist = setlists.find(s => s.id === id);
  if (!activeSetlist || !activeSetlist.entries.length) return;
  activeIdx = 0;
  renderSong();
}

function renderSong() {
  if (!activeSetlist) return;
  const entry = activeSetlist.entries[activeIdx];
  if (!entry) return;
  const song = songs.find(s => s.id === entry.songId);
  if (!song) return;
  const ton = song.tonalities.find(t => t.id === entry.tonalityId) || song.tonalities[0];
  const offset = ton.transposeOffset || 0;

  document.getElementById('songTitle').textContent = song.name;
  const chip = document.getElementById('tonChip');
  chip.textContent = ton.name + (offset ? (offset>0?' +'+offset:' '+offset) : '');
  chip.style.display = 'inline-block';

  document.getElementById('prevBtn').disabled = activeIdx === 0;
  document.getElementById('nextBtn').disabled = activeIdx === activeSetlist.entries.length - 1;
  document.getElementById('navCounter').textContent = (activeIdx+1) + '/' + activeSetlist.entries.length;

  const inner = document.getElementById('lyricsInner');
  inner.style.fontSize = fontSize + 'rem';

  const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const ENHARMONIC = {'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#','C#':'C#','D#':'D#','F#':'F#','G#':'G#','A#':'A#'};
  function noteIdx(n) { return CHROMATIC.indexOf(ENHARMONIC[n]||n); }
  function transposeNote(n,s) { const i=noteIdx(n); if(i===-1)return n; return CHROMATIC[((i+s)%12+12)%12]; }
  function transposeChord(c,s) {
    if(!c||!s) return c;
    const m=c.match(/^([A-G][#b]?)(.*)/); if(!m) return c;
    const sl=m[2].match(/^(.*)\/([A-G][#b]?)$/);
    if(sl) return transposeNote(m[1],s)+sl[1]+'/'+transposeNote(sl[2],s);
    return transposeNote(m[1],s)+m[2];
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function lineKey(li,wi){ return li+'_'+wi; }

  const lines = song.text.split('\n');
  inner.innerHTML = lines.map((line,li) => {
    if (!line.trim()) return '<div class="lyric-line empty-line"></div>';
    const words = line.split(/\s+/).filter(Boolean);
    return '<div class="lyric-line">' + words.map((word,wi) => {
      const raw = ton.chords[lineKey(li,wi)] || '';
      const chord = raw ? transposeChord(raw, offset) : '';
      return `<span class="word-unit"><span class="chord-label${chord?' has-chord':''}">${esc(chord)||'&nbsp;'}</span><span class="word-text">${esc(word)}</span></span>`;
    }).join('') + '</div>';
  }).join('');

  document.getElementById('lyricsPanel').scrollTop = 0;
  stopScroll();
}

window.navPrev = function() {
  if (!activeSetlist || activeIdx <= 0) return;
  activeIdx--; renderSong();
};
window.navNext = function() {
  if (!activeSetlist || activeIdx >= activeSetlist.entries.length - 1) return;
  activeIdx++; renderSong();
};

// font size
window.changeFontSize = function(delta) {
  fontSize = Math.max(0.8, Math.min(2.2, fontSize + delta * 0.15));
  const inner = document.getElementById('lyricsInner');
  inner.style.fontSize = fontSize + 'rem';
  inner.style.lineHeight = (fontSize > 1.4 ? 3.6 : 3.2).toString();
};

// auto scroll
window.toggleScroll = function() { scrollActive ? stopScroll() : startScroll(); };
function startScroll() {
  scrollActive = true;
  const btn = document.getElementById('scrollBtn');
  btn.classList.add('active'); btn.textContent = '⏸ Stop';
  runScroll();
}
function stopScroll() {
  scrollActive = false;
  clearTimeout(scrollTimer);
  const btn = document.getElementById('scrollBtn');
  btn.classList.remove('active'); btn.textContent = '▶ Scroll';
}
function runScroll() {
  if (!scrollActive) return;
  const el = document.getElementById('lyricsPanel');
  el.scrollTop += window.scrollSpeed * 0.4;
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 10) { stopScroll(); return; }
  scrollTimer = setTimeout(runScroll, 40);
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { navPrev(); }
  else if (e.key === 'ArrowRight') { navNext(); }
  else if (e.key === ' ') { e.preventDefault(); toggleScroll(); }
  else if (e.key === 'ArrowUp') document.getElementById('lyricsPanel').scrollBy(0,-80);
  else if (e.key === 'ArrowDown') document.getElementById('lyricsPanel').scrollBy(0,80);
});

// ── Firebase: connection status ──
onValue(ref(db, '.info/connected'), snap => {
  const ok = snap.val();
  const dot = document.getElementById('connDot');
  dot.className = 'conn-dot' + (ok ? '' : ' off');
});

// ── Firebase: requests ──
let requests = {};
let fbReady = false;

onValue(ref(db, 'requests'), snap => {
  requests = {};
  if (snap.exists()) snap.forEach(c => { requests[c.key] = { id: c.key, ...c.val() }; });
  fbReady = true;
  renderOrders();
});

let firstChild = true;
onChildAdded(ref(db, 'requests'), snap => {
  if (!fbReady || firstChild) { firstChild = false; return; }
  const req = { id: snap.key, ...snap.val() };
  requests[snap.key] = req;
  renderOrders();
  triggerNotif(req);
});
setTimeout(() => { firstChild = false; }, 3000);

function renderOrders() {
  const list = document.getElementById('ordersList');
  const badge = document.getElementById('ordBadge');
  const pending = Object.values(requests)
    .filter(r => r.status !== 'done' && r.status !== 'deleted')
    .sort((a,b) => (a.timestamp||0)-(b.timestamp||0));

  badge.textContent = pending.length;
  badge.className = 'orders-badge' + (pending.length === 0 ? ' zero' : '');

  if (!pending.length) {
    list.innerHTML = '<div class="orders-empty"><div class="e-icon">🎵</div><p>Nema narudžbina<br>Čekamo goste...</p></div>';
    return;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }
  function fmtTime(ts) { if(!ts) return ''; return new Date(ts).toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'}); }

  list.innerHTML = pending.map((req,i) => `
    <div class="ord-card ${req.inDb===false?'not-in-db':'in-db'}">
      <div class="ord-song">${esc(req.songName)}</div>
      <div class="ord-guest">od: <span>${esc(req.guestName)}</span></div>
      ${req.inDb===false ? '<div class="ord-no-db">⚠ Nema u bazi</div>' : ''}
      ${req.message ? `<div class="ord-msg">${esc(req.message)}</div>` : ''}
      <div class="ord-time">${fmtTime(req.timestamp)}</div>
      <div class="ord-btns">
        <button class="ord-btn open" onclick="openRequest('${esc(req.songName)}','${req.id}')">🎸 Otvori</button>
        <button class="ord-btn done" onclick="markDone('${req.id}')">✓</button>
        <button class="ord-btn del" onclick="deleteReq('${req.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

window.openRequest = function(songName, reqId) {
  const found = songs.find(s => s.name.toLowerCase() === songName.toLowerCase())
    || songs.find(s => s.name.toLowerCase().includes(songName.toLowerCase().substring(0,4)));

  if (found) {
    // find which setlist contains this song, or just show it
    // Try to find in current setlist
    if (activeSetlist) {
      const idx = activeSetlist.entries.findIndex(e => e.songId === found.id);
      if (idx !== -1) {
        activeIdx = idx;
        renderSong();
        return;
      }
    }
    // Load the song directly (create temp view)
    const ton = found.tonalities[0];
    activeSetlist = { entries: [{ songId: found.id, tonalityId: ton.id }] };
    activeIdx = 0;
    renderSong();
    // Reset counter
    document.getElementById('navCounter').textContent = '—';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
  } else {
    // Not found — flash warning
    const title = document.getElementById('songTitle');
    title.textContent = '⚠ "' + songName + '" nije u bazi';
    title.style.color = 'var(--danger)';
    setTimeout(() => { title.style.color = ''; if(activeSetlist) renderSong(); else title.textContent='Pesma nije pronađena'; }, 3000);
  }
};

window.markDone = async function(id) {
  await update(ref(db, 'requests/' + id), { status: 'done' });
  delete requests[id]; renderOrders();
};
window.deleteReq = async function(id) {
  await remove(ref(db, 'requests/' + id));
  delete requests[id]; renderOrders();
};
window.clearAll = async function() {
  if (!confirm('Obrisati sve narudžbine?')) return;
  await remove(ref(db, 'requests'));
  requests = {}; renderOrders();
};
window.publishSongs = async function(btn) {
  if (!songs.length) { showToast('Nema pesama!'); return; }
  try {
    await set(ref(db, 'public/songs'), songs.map(s => s.name));
    const orig = btn.textContent;
    btn.textContent = '✓ Objavljeno';
    btn.style.background = 'var(--success)';
    btn.style.borderColor = 'var(--success)';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; btn.style.borderColor = ''; }, 2000);
  } catch(e) { showToast('⚠ Greška pri objavljivanju'); }
};

// ── Notification ──
let notifTimer = null;
let pendingNotifReq = null;

function triggerNotif(req) {
  pendingNotifReq = req;
  const p = document.getElementById('notifPopup');
  document.getElementById('notifSong').textContent = '♪ ' + req.songName;
  document.getElementById('notifGuest').textContent = 'od: ' + req.guestName;
  const msgEl = document.getElementById('notifMsg');
  if (req.message) { msgEl.textContent = '"' + req.message + '"'; msgEl.style.display = 'block'; }
  else { msgEl.style.display = 'none'; }
  const noDbEl = document.getElementById('notifNoDb');
  noDbEl.style.display = req.inDb === false ? 'block' : 'none';
  p.className = 'notif-popup show' + (req.inDb === false ? ' not-in-db' : '');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(hideNotif, 8000);
  if (Notification.permission === 'granted') {
    new Notification('🎵 ' + req.songName, {
      body: 'od: ' + req.guestName + (req.message ? '\n"' + req.message + '"' : '') + (req.inDb === false ? '\n⚠ NEMA U BAZI' : '')
    });
  }
}
window.hideNotif = function() { document.getElementById('notifPopup').classList.remove('show'); };
window.notifOpen = function() {
  if (pendingNotifReq) openRequest(pendingNotifReq.songName, pendingNotifReq.id);
  hideNotif();
};

// ── QR ──
const GUEST_URL = window.location.href.replace('nastup.html', 'guest.html').split('?')[0].split('#')[0];

window.showQR = function() {
  document.getElementById('qrUrl').textContent = GUEST_URL;
  document.getElementById('qrOverlay').classList.add('show');
  const canvas = document.getElementById('qrCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { ctx.clearRect(0,0,200,200); ctx.drawImage(img,0,0,200,200); };
  img.onerror = () => {
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,200,200);
    ctx.fillStyle='#328EFC'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('Kopiraj URL ispod', 100, 100);
  };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(GUEST_URL)}&bgcolor=ffffff&color=121212&margin=10`;
};
window.hideQR = function() { document.getElementById('qrOverlay').classList.remove('show'); };
window.copyUrl = function() {
  navigator.clipboard?.writeText(GUEST_URL);
  const el = document.getElementById('qrUrl');
  el.textContent = '✓ Kopirano!';
  setTimeout(() => el.textContent = GUEST_URL, 1500);
};
window.downloadQR = function() {
  const a = document.createElement('a');
  a.download = 'qr-narucivanje.png';
  a.href = document.getElementById('qrCanvas').toDataURL();
  a.click();
};

// Request browser notification permission
if (Notification.permission === 'default') Notification.requestPermission();

// ── Init ──
loadLocal();
</script>
</body>
</html>
