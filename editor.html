<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordSheet</title>
<style>
:root {
    --bg: #121212;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: #2e2e2e;
    --text: #ffffff;
    --text-muted: #888;
    --accent: #328EFC;
    --accent-hover: #1a7de8;
    --accent-dim: rgba(50,142,252,0.15);
    --danger: #e84040;
    --success: #3dba6f;
    --font-mono: 'Consolas', 'Courier New', monospace;
    --font-ui: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg2);
    flex-shrink: 0;
  }
  header svg { color: var(--accent); flex-shrink: 0; }
  header h1 { font-family: var(--font-mono); font-size: 1.25rem; letter-spacing: 0.04em; color: var(--accent); }

  .header-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .hdr-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); cursor: pointer; font-size: 0.78rem;
    font-family: var(--font-ui); padding: 5px 10px;
    display: flex; align-items: center; gap: 5px; transition: all 0.15s;
  }
  .hdr-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .hdr-btn:disabled { opacity: 0.28; cursor: not-allowed; }
  .hdr-btn kbd { font-size: 0.65rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; color: var(--text-muted); }

  .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 4px; transition: background 0.3s; }
  .save-dot.dirty { background: #f0a500; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(0);
    background: #2a2a2a; border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 18px; font-size: 0.82rem; color: var(--text);
    box-shadow: 0 6px 24px rgba(0,0,0,0.5); z-index: 9999;
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.green { border-color: var(--success); color: var(--success); }
  .toast.blue  { border-color: var(--accent);  color: var(--accent); }

  /* ── LAYOUT ── */
  .app { display: flex; flex: 1; min-height: 0; overflow: hidden; height: calc(100vh - 57px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── SIDEBAR TABS ── */
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-tab {
    flex: 1; padding: 10px 6px; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 0.75rem;
    font-family: var(--font-ui); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; border-bottom: 2px solid transparent;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .sidebar-tab:hover { color: var(--text); }
  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PANELS ── */
 #songPanel, #setlistPanel {
  display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0;
}

  /* ── SEARCH ── */
  .search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); position: relative; flex-shrink: 0; }
  .search-wrap svg { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--font-ui); font-size: 0.83rem;
    padding: 7px 28px 7px 30px; outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 0.9rem; padding: 2px 4px; border-radius: 3px; display: none; transition: color 0.1s;
  }
  .search-clear:hover { color: var(--text); }
  .search-clear.visible { display: block; }

  .song-count { padding: 5px 16px 3px; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }

  /* ── SONG LIST ── */
.song-list {
  flex: 1; overflow-y: auto; padding: 8px 0; min-height: 0;
}
  .song-item {
    padding: 10px 16px; cursor: pointer; display: flex; align-items: center;
    gap: 10px; border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s; font-size: 0.88rem;
  }
  .song-item:hover { background: var(--bg3); }
  .song-item.active { background: var(--accent-dim); border-left-color: var(--accent); color: var(--accent); }
  .song-item-icon { font-size: 0.85rem; opacity: 0.5; }
  .song-item-name { flex: 1; overflow: hidden; }
  .song-item-name mark { background: rgba(50,142,252,0.35); color: var(--accent); border-radius: 2px; padding: 0 1px; font-weight: 600; }
  .song-item-del { opacity: 0; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; padding: 0 2px; transition: opacity 0.15s; }
  .song-item:hover .song-item-del { opacity: 1; }

  .no-results { padding: 24px 16px; text-align: center; color: var(--text-muted); font-size: 0.82rem; }
  .no-results div:first-child { font-size: 1.4rem; margin-bottom: 6px; }

  /* ── ADD BUTTON ── */
  .add-song-btn {
    margin: 12px; padding: 9px;
    background: var(--accent-dim); border: 1px dashed rgba(50,142,252,0.4);
    border-radius: 6px; color: var(--accent); cursor: pointer; font-size: 0.82rem;
    font-family: var(--font-ui); display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .add-song-btn:hover { background: rgba(50,142,252,0.25); border-color: var(--accent); }

  /* ── SETLIST SIDEBAR ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  height: 100%;
}
  .setlist-list { flex: 1; overflow-y: auto; padding: 8px 0; min-height: 0; }
  .setlist-item {
    padding: 9px 16px; cursor: pointer; display: flex; align-items: center;
    gap: 8px; border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s; font-size: 0.85rem;
  }
  .setlist-item:hover { background: var(--bg3); }
  .setlist-item.active { background: var(--accent-dim); border-left-color: var(--accent); color: var(--accent); }
  .setlist-item-icon { opacity: 0.5; font-size: 0.8rem; }
  .setlist-item-info { flex: 1; overflow: hidden; }
  .setlist-item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  .setlist-item-count { font-size: 0.68rem; color: var(--text-muted); }
  .setlist-item-del { opacity: 0; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; padding: 0 2px; transition: opacity 0.15s; }
  .setlist-item:hover .setlist-item-del { opacity: 1; }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  /* ── SONG TOOLBAR ── */
  .song-toolbar {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg2); display: flex; align-items: center;
    gap: 12px; flex-wrap: wrap; flex-shrink: 0;
  }
  .song-name-input {
    background: none; border: none; font-family: var(--font-mono);
    font-size: 1.15rem; font-weight: 600; color: var(--text); outline: none;
    min-width: 180px; max-width: 300px; border-bottom: 1px solid var(--border);
    padding-bottom: 2px; transition: border-color 0.15s;
  }
  .song-name-input:focus { border-bottom-color: var(--accent); }
  .toolbar-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

  .tonality-tabs { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tonality-tabs label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-right: 4px; }
  .ton-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text-muted); cursor: pointer;
    font-size: 0.8rem; font-family: var(--font-mono); transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .ton-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .ton-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ton-btn .ton-del { font-size: 0.75rem; opacity: 0.6; line-height: 1; margin-left: 2px; transition: opacity 0.1s; }
  .ton-btn:hover .ton-del { opacity: 1; }
  .ton-refresh { font-size: 0.8rem; opacity: 0; margin-left: 1px; transition: opacity 0.1s; color: #fff; }
  .ton-btn:hover .ton-refresh { opacity: 0.8; }
  .ton-btn.active .ton-refresh { opacity: 0.6; }
  .ton-btn.active:hover .ton-refresh { opacity: 1; }
  .ton-add-btn {
    padding: 5px 10px; border-radius: 20px; border: 1px dashed rgba(50,142,252,0.4);
    background: none; color: var(--accent); cursor: pointer; font-size: 0.8rem;
    font-family: var(--font-ui); transition: all 0.15s;
  }
  .ton-add-btn:hover { background: var(--accent-dim); }

  .mode-btns { margin-left: auto; display: flex; gap: 4px; }
  .mode-btn {
    padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
    background: none; color: var(--text-muted); cursor: pointer; font-size: 0.78rem;
    font-family: var(--font-ui); transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

  /* ── TRANSPOSE ── */
  .transpose-row {
    display: flex; align-items: center; gap: 6px; padding: 8px 24px;
    background: rgba(50,142,252,0.06); border-bottom: 1px solid var(--border);
    font-size: 0.8rem; flex-shrink: 0;
  }
  .transpose-row label { color: var(--text-muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .tp-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text); cursor: pointer; font-size: 1rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; transition: all 0.13s; flex-shrink: 0;
  }
  .tp-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .tp-semitone { min-width: 80px; text-align: center; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); font-weight: 600; }
  .tp-reset {
    padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: none; color: var(--text-muted); cursor: pointer; font-size: 0.72rem;
    font-family: var(--font-ui); transition: all 0.13s;
  }
  .tp-reset:hover { border-color: var(--danger); color: var(--danger); }
  .transpose-row .tp-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }

  /* ── EDITOR AREA ── */
  .editor-area { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; gap: 32px; min-height: 0; }

  .raw-editor { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .raw-editor label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .raw-editor textarea {
    flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-mono); font-size: 0.92rem; line-height: 1.8;
    padding: 18px; resize: none; outline: none; min-height: 380px; transition: border-color 0.15s;
  }
  .raw-editor textarea:focus { border-color: var(--accent); }
  .save-text-btn {
    align-self: flex-end; padding: 8px 22px; background: var(--accent); border: none;
    border-radius: 6px; color: #fff; font-family: var(--font-ui); font-size: 0.85rem;
    cursor: pointer; transition: background 0.15s;
  }
  .save-text-btn:hover { background: var(--accent-hover); }

  .chord-editor { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chord-editor-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .lyrics-block {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px 22px; font-family: var(--font-mono); font-size: 0.92rem;
    line-height: 2.6; flex: 1; overflow-y: auto;
  }
  .lyric-line { display: flex; flex-wrap: wrap; align-items: flex-end; min-height: 2.4em; }
  .lyric-line.empty-line { min-height: 1.2em; }

  .word-unit { display: inline-flex; flex-direction: column; align-items: flex-start; margin-right: 6px; position: relative; cursor: pointer; }
  .word-unit .chord-slot {
    font-size: 0.78rem; font-weight: 700; min-height: 20px; padding: 1px 7px;
    border-radius: 4px; background: var(--accent); color: #fff; font-family: var(--font-mono);
    white-space: nowrap; line-height: 1.5; display: inline-block; visibility: hidden; transition: transform 0.1s;
  }
  .word-unit .chord-slot.has-chord { visibility: visible; }
  .word-unit .chord-slot.editing-slot { visibility: visible; background: #1a5fbc; outline: 2px solid #fff; }
  .word-unit:hover .chord-slot:not(.has-chord) { visibility: visible; background: rgba(50,142,252,0.3); color: var(--accent); }
  .word-unit .word-text { color: var(--text); transition: color 0.1s; user-select: none; }
  .word-unit:hover .word-text { color: var(--accent); }

  .chord-popup {
    position: fixed; background: #1e1e1e; border: 1px solid var(--accent); border-radius: 8px;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6); min-width: 180px; animation: popIn 0.12s ease;
  }
  @keyframes popIn { from { opacity:0; transform: scale(0.92) translateY(-4px); } to { opacity:1; transform: scale(1) translateY(0); } }
  .chord-popup input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); font-family: var(--font-mono); font-size: 1rem; padding: 6px 10px;
    outline: none; width: 100%; transition: border-color 0.15s;
  }
  .chord-popup input:focus { border-color: var(--accent); }
  .chord-popup-label { font-size: 0.7rem; color: var(--text-muted); }
  .chord-popup-actions { display: flex; gap: 6px; }
  .chord-popup-actions button { flex: 1; padding: 5px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.78rem; font-family: var(--font-ui); transition: background 0.12s; }
  .btn-set { background: var(--accent); color: #fff; }
  .btn-set:hover { background: var(--accent-hover); }
  .btn-clear { background: var(--bg3); color: var(--danger); border: 1px solid var(--border) !important; }
  .btn-clear:hover { background: rgba(232,64,64,0.15); }

  .preset-chords { display: flex; flex-wrap: wrap; gap: 4px; }
  .preset-chord {
    padding: 3px 8px; border-radius: 4px; background: var(--accent-dim);
    border: 1px solid rgba(50,142,252,0.25); color: var(--accent);
    font-family: var(--font-mono); font-size: 0.75rem; cursor: pointer; transition: background 0.12s;
  }
  .preset-chord:hover { background: rgba(50,142,252,0.35); }

  .view-line { display: flex; flex-wrap: wrap; align-items: flex-end; min-height: 2.4em; }
  .view-line.empty-line { min-height: 1.2em; }
  .view-word { display: inline-flex; flex-direction: column; margin-right: 8px; }
  .view-chord { font-size: 0.78rem; font-weight: 700; padding: 1px 7px; border-radius: 4px; background: var(--accent); color: #fff; white-space: nowrap; line-height: 1.5; visibility: hidden; }
  .view-chord.has-chord { visibility: visible; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text-muted); font-size: 0.9rem; text-align: center; }
  .empty-state svg { opacity: 0.2; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal {
    background: #1e1e1e; border: 1px solid var(--border); border-radius: 10px; padding: 24px;
    min-width: 320px; max-width: 420px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    animation: slideUp 0.15s ease;
  }
  @keyframes slideUp { from { transform: translateY(14px); opacity:0 } to { transform: none; opacity:1 } }
  .modal h2 { font-size: 1rem; margin-bottom: 16px; font-family: var(--font-mono); }
  .modal input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--font-mono); font-size: 0.9rem; padding: 9px 12px;
    outline: none; margin-bottom: 14px; transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button { padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.83rem; font-family: var(--font-ui); }
  .btn-cancel { background: var(--bg3); color: var(--text-muted); border: 1px solid var(--border) !important; }
  .btn-cancel:hover { border-color: var(--text-muted) !important; color: var(--text); }
  .btn-ok { background: var(--accent); color: #fff; }
  .btn-ok:hover { background: var(--accent-hover); }

  /* ── TONALITY MODAL ── */
  .ton-modal-label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
  .ton-modal-sep { height: 1px; background: var(--border); margin: 14px 0; }
  .ton-source-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .ton-src-btn {
    flex: 1; min-width: 90px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text-muted); cursor: pointer; text-align: left;
    display: flex; flex-direction: column; gap: 3px; transition: all 0.15s; font-family: var(--font-ui);
  }
  .ton-src-btn:hover { border-color: var(--accent); color: var(--text); }
  .ton-src-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
  .ton-src-icon { font-size: 1.1rem; }
  .ton-src-text { font-size: 0.85rem; font-weight: 600; color: var(--text); }
  .ton-src-desc { font-size: 0.72rem; color: var(--text-muted); }

  /* ── FULLSCREEN ── */
  .fs-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 500; flex-direction: column; }
  .fs-overlay.active { display: flex; }
  .fs-header {
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px; background: var(--bg2); flex-shrink: 0;
  }
  .fs-title { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600; flex: 1; }
  .fs-tonality { font-size: 0.78rem; color: var(--accent); font-family: var(--font-mono); background: var(--accent-dim); padding: 3px 10px; border-radius: 12px; border: 1px solid rgba(50,142,252,0.3); }
  .fs-controls { display: flex; align-items: center; gap: 10px; }
  .fs-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3);
    color: var(--text-muted); cursor: pointer; font-size: 0.8rem; font-family: var(--font-ui);
    display: flex; align-items: center; gap: 6px; transition: all 0.13s;
  }
  .fs-btn:hover { border-color: var(--accent); color: var(--accent); }
  .fs-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .fs-btn.danger { border-color: transparent; }
  .fs-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .fs-nav { display: flex; align-items: center; gap: 6px; }
  .fs-nav-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3);
    color: var(--text); cursor: pointer; font-size: 0.9rem; transition: all 0.13s;
  }
  .fs-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .fs-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

<script>
const STORAGE_KEY = 'chordsheet_v2';
const COMMON_CHORDS = ['Am','Dm','Em','G','C','F','E','A','D','B','Bm','Fm','Gm','Cm','E7','Am7','Dm7','G7','C7','F7'];
const MAX_HISTORY = 60;
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARMONIC = {'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#','C#':'C#','D#':'D#','F#':'F#','G#':'G#','A#':'A#'};

// ── DATA ──
let songs = [{
  id: 1, name: 'Tamo Daleko',
  tonalities: [
    {id:101, name:'Am (original)', chords:{}},
    {id:102, name:'Dm (transpozicija)', chords:{}},
    {id:103, name:'Em (gitara)', chords:{}}
  ],
  activeTonality: 101,
  text: `Tamo daleko daleko kraj mora\nTamo je selo moje tamo je Srbija\nTamo daleko daleko kraj mora\nGde cveća ima gde pesma odzvanja\n\nTamo daleko gde sunce ne sija\nJa čamim tužan u tmini daleko\nTamo daleko daleko kraj mora\nTu srce moje i dan danas plaka`
}];
let activeSongId = null;
let editMode = 'chords';
let setlists = [];
let activeSetlistId = null;
let searchQuery = '';
let sidebarTab = 'songs';
let popupWordEl = null, popupLineIdx = null, popupWordIdx = null;
let fsSetlistMode = false, fsSetlistIdx = 0;
let autoScrollTimer = null, autoScrollActive = false, scrollSpeedVal = 4;
let addTonalitySongId = null, tonModalSource = 'empty', tonModalSemitones = 0;
let pickerSetlistId = null;
let slDragIdx = null;
let _modalCallback = null;
let _toastTimer = null;

// ── UNDO/REDO ──
let history = [], historyIdx = -1, _skipSnapshot = false;

function snapshot() {
  if (_skipSnapshot) return;
  history = history.slice(0, historyIdx + 1);
  history.push(JSON.stringify({songs, activeSongId, setlists, activeSetlistId}));
  if (history.length > MAX_HISTORY) history.shift();
  historyIdx = history.length - 1;
  updateUndoRedoBtns(); markDirty();
}
function undo() { if (historyIdx<=0) return; historyIdx--; restoreSnapshot(history[historyIdx]); showToast('↩ Undo','blue'); }
function redo() { if (historyIdx>=history.length-1) return; historyIdx++; restoreSnapshot(history[historyIdx]); showToast('↪ Redo','blue'); }
function restoreSnapshot(snap) {
  _skipSnapshot = true;
  const s = JSON.parse(snap);
  songs = s.songs; activeSongId = s.activeSongId;
  setlists = s.setlists||[]; activeSetlistId = s.activeSetlistId||null;
  _skipSnapshot = false;
  updateUndoRedoBtns(); renderSidebar(); renderMain(); saveToStorage();
}
function updateUndoRedoBtns() {
  document.getElementById('undoBtn').disabled = historyIdx<=0;
  document.getElementById('redoBtn').disabled = historyIdx>=history.length-1;
}

// ── STORAGE ──
let _saveTimer = null;
function markDirty() {
  const dot=document.getElementById('saveDot'), lbl=document.getElementById('saveLabel');
  if(dot){dot.classList.add('dirty'); lbl.textContent='Nije sačuvano';}
  clearTimeout(_saveTimer); _saveTimer = setTimeout(saveToStorage, 800);
}
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({songs, activeSongId, setlists, activeSetlistId}));
    const dot=document.getElementById('saveDot'), lbl=document.getElementById('saveLabel');
    if(dot){dot.classList.remove('dirty'); lbl.textContent='Sačuvano';}
  } catch(e){}
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (s.songs && s.songs.length) {
      songs=s.songs; activeSongId=s.activeSongId;
      setlists=s.setlists||[]; activeSetlistId=s.activeSetlistId||null;
      return true;
    }
  } catch(e){}
  return false;
}

// ── TOAST ──
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(_toastTimer); _toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ── UTILS ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function lineKey(li,wi) { return `${li}_${wi}`; }

// ── TRANSPOSE ──
function noteIdx(note) { const n=ENHARMONIC[note]||note; return CHROMATIC.indexOf(n); }
function parseRootNote(input) { const m=input.match(/^([A-G][#b]?)/); return m?m[1]:null; }
function transposeNote(note,semi) { const i=noteIdx(note); if(i===-1) return note; return CHROMATIC[((i+semi)%12+12)%12]; }
function transposeChord(chord,semi) {
  if(!chord) return chord;
  const m=chord.match(/^([A-G][#b]?)(.*)/); if(!m) return chord;
  const root=m[1], suffix=m[2];
  const slashM=suffix.match(/^(.*)\/([A-G][#b]?)$/);
  if(slashM) return transposeNote(root,semi)+slashM[1]+'/'+transposeNote(slashM[2],semi);
  return transposeNote(root,semi)+suffix;
}
function displayChord(raw,offset) { if(!offset) return raw; return transposeChord(raw,offset); }
function getTonalityOffset(song) { return getActiveTonality(song).transposeOffset||0; }
function transposeLabel(song) { const o=getTonalityOffset(song); if(o===0) return 'Original (0)'; return (o>0?'+':'')+o+' polutona'; }

function transpose(delta) {
  const song=getActiveSong(), ton=getActiveTonality(song);
  ton.transposeOffset=Math.max(-11,Math.min(11,(ton.transposeOffset||0)+delta));
  snapshot(); renderMain(); showToast(`Transpozicija: ${transposeLabel(song)}`,'blue');
}
function resetTranspose() {
  const song=getActiveSong(), ton=getActiveTonality(song);
  ton.transposeOffset=0; snapshot(); renderMain(); showToast('Transpozicija resetovana');
}

// ── SIDEBAR TABS ──
function switchSidebarTab(tab) {
  sidebarTab = tab;
  document.getElementById('tabSongs').classList.toggle('active', tab==='songs');
  document.getElementById('tabSetlists').classList.toggle('active', tab==='setlists');
  const sp = document.getElementById('songPanel');
  const slp = document.getElementById('setlistPanel');
  if (tab === 'songs') {
    sp.style.display = 'flex'; sp.style.flexDirection = 'column';
    slp.style.display = 'none';
  } else {
    sp.style.display = 'none';
    slp.style.display = 'flex'; slp.style.flexDirection = 'column';
    renderSetlistSidebar();
  }
}

// ── SEARCH ──
function onSearch(val) {
  searchQuery=val.trim();
  document.getElementById('searchClear').classList.toggle('visible',searchQuery.length>0);
  renderSidebar();
}
function clearSearch() {
  searchQuery='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchInput').focus();
  renderSidebar();
}
function highlightMatch(text,query) {
  if(!query) return esc(text);
  const i=text.toLowerCase().indexOf(query.toLowerCase());
  if(i===-1) return esc(text);
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+query.length))+'</mark>'+esc(text.slice(i+query.length));
}

// ── RENDER SIDEBAR ──
function renderSidebar() {
  const list=document.getElementById('songList'), countEl=document.getElementById('songCount');
  list.innerHTML='';
  const filtered=searchQuery ? songs.filter(s=>s.name.toLowerCase().includes(searchQuery.toLowerCase())||s.text.toLowerCase().includes(searchQuery.toLowerCase())) : songs;
  countEl.textContent=searchQuery?`${filtered.length} od ${songs.length} pesama`:(songs.length===1?'1 pesma':`${songs.length} pesama`);
  if(!filtered.length) { list.innerHTML=`<div class="no-results"><div>🔍</div><div>Nema rezultata za<br><strong>"${esc(searchQuery)}"</strong></div></div>`; return; }
  filtered.forEach(s => {
    const el=document.createElement('div');
    el.className='song-item'+(s.id===activeSongId?' active':'');
    const nameMatch=s.name.toLowerCase().includes(searchQuery.toLowerCase());
    const textMatch=searchQuery&&!nameMatch&&s.text.toLowerCase().includes(searchQuery.toLowerCase());
    el.innerHTML=`<span class="song-item-icon">♪</span><span class="song-item-name" style="display:flex;flex-direction:column;gap:1px"><span>${highlightMatch(s.name,searchQuery)}</span>${textMatch?`<span style="font-size:0.68rem;color:var(--text-muted)">↳ u tekstu</span>`:''}</span><button class="song-item-del" onclick="deleteSong(${s.id},event)">✕</button>`;
    el.addEventListener('click',()=>selectSong(s.id));
    list.appendChild(el);
  });
}

function selectSong(id) { activeSongId=id; editMode='chords'; renderSidebar(); renderMain(); saveToStorage(); }
function getActiveSong() { return songs.find(s=>s.id===activeSongId); }
function getActiveTonality(song) { return song.tonalities.find(t=>t.id===song.activeTonality)||song.tonalities[0]; }

// ── RENDER MAIN ──
function renderMain() {
  const main=document.getElementById('mainArea');

        <button class="mode-btn${editMode==='view'?' active':''}" onclick="setMode('view')">👁 Prikaz</button>
        <button class="mode-btn" onclick="enterFullscreen()">⛶ Fullscreen</button>
      </div>
    </div>
    <div class="transpose-row">
      <label>Transpozicija:</label>
      <button class="tp-btn" onclick="transpose(-1)">−</button>
      <span class="tp-semitone" id="tpDisplay">${transposeLabel(song)}</span>
      <button class="tp-btn" onclick="transpose(+1)">+</button>
      <button class="tp-reset" onclick="resetTranspose()">Reset</button>
      <span class="tp-sep"></span>
      <span style="font-size:0.75rem;color:var(--text-muted)">Klikni − / + da pomeriš sve akorde za pola tona</span>
    </div>

  renderEditor(song, ton);
}

function renderEditor(song, ton) {
  const area=document.getElementById('editorArea');
  if(editMode==='text') { area.innerHTML=`<div class="raw-editor"><label>Tekst pesme</label><textarea id="rawTextarea" spellcheck="false">${esc(song.text)}</textarea><button class="save-text-btn" onclick="saveText(${song.id})">Sačuvaj tekst</button></div>`; return; }
  const lines=song.text.split('\n');
  const offset=ton.transposeOffset||0;
  if(editMode==='view') {
    const html=lines.map((line,li)=>{
      if(!line.trim()) return `<div class="view-line empty-line"><span>&nbsp;</span></div>`;
      return `<div class="view-line">${line.split(/\s+/).filter(Boolean).map((word,wi)=>{const c=ton.chords[lineKey(li,wi)]?displayChord(ton.chords[lineKey(li,wi)],offset):'';return `<span class="view-word"><span class="view-chord${c?' has-chord':''}">${esc(c)||'&nbsp;'}</span><span>${esc(word)}</span></span>`;}).join(' ')}</div>`;
    }).join('');
    area.innerHTML=`<div class="chord-editor"><div class="chord-editor-label">Prikaz — ${esc(ton.name)}${offset!==0?' ('+(offset>0?'+':'')+offset+' polutona)':''}</div><div class="lyrics-block">${html}</div></div>`;
    return;
  }
  const html=lines.map((line,li)=>{
    if(!line.trim()) return `<div class="lyric-line empty-line"><span>&nbsp;</span></div>`;
    return `<div class="lyric-line">${line.split(/\s+/).filter(Boolean).map((word,wi)=>{const raw=ton.chords[lineKey(li,wi)]||'';const c=raw?displayChord(raw,offset):'';return `<span class="word-unit" onclick="openChordPopup(event,${li},${wi})"><span class="chord-slot${c?' has-chord':''}" id="cs_${li}_${wi}">${esc(c)||'+'}</span><span class="word-text">${esc(word)}</span></span>`;}).join('')}</div>`;
  }).join('');
  area.innerHTML=`<div class="chord-editor"><div class="chord-editor-label">Klikni na reč da dodaš akord — ${esc(ton.name)}</div><div class="lyrics-block">${html}</div></div>`;
}

// ── CHORD POPUP ──
function openChordPopup(e,li,wi) {
  e.stopPropagation(); popupLineIdx=li; popupWordIdx=wi;
  const ton=getActiveTonality(getActiveSong());
  const popup=document.getElementById('chordPopup'), inp=document.getElementById('chordInput');
  inp.value=ton.chords[lineKey(li,wi)]||'';
  document.getElementById('presetChords').innerHTML=COMMON_CHORDS.map(c=>`<span class="preset-chord" onclick="pickPreset('${c}')">${c}</span>`).join('');
  const rect=e.currentTarget.getBoundingClientRect();
  popup.style.display='flex';
  let top=rect.bottom+8, left=rect.left;
  if(left+200>window.innerWidth) left=window.innerWidth-205;
  if(top+200>window.innerHeight) top=rect.top-208;
  popup.style.top=top+'px'; popup.style.left=left+'px';
  inp.focus(); inp.select();
  popupWordEl=document.getElementById(`cs_${li}_${wi}`);
  if(popupWordEl) popupWordEl.classList.add('editing-slot');
}
function pickPreset(c) { document.getElementById('chordInput').value=c; setChord(); }
function setChord() { applyChord(document.getElementById('chordInput').value.trim()||null); }
function clearChord() { applyChord(null); }
function applyChord(val) {
  const ton=getActiveTonality(getActiveSong()), key=lineKey(popupLineIdx,popupWordIdx);
  if(val) ton.chords[key]=val; else delete ton.chords[key];
  // Auto-detect tonality name from first chord added
  if(val && ton.name === 'Original' && Object.keys(ton.chords).length === 1) {
    const root = val.match(/^([A-G][#b]?)/);
    if(root) {
      const isMinor = /^m(?!aj)/i.test(val.slice(root[0].length));
      ton.name = root[1] + (isMinor ? 'm' : '') + ' (original)';
    }
  }
  hideChordPopup(); snapshot(); renderMain();
}
function hideChordPopup() {
  document.getElementById('chordPopup').style.display='none';
  if(popupWordEl){popupWordEl.classList.remove('editing-slot');popupWordEl=null;}
}

function startAutoScroll() {

}
function stopAutoScroll() {

function runScroll() {

function selectSetlist(id) { activeSetlistId=id; renderSetlistSidebar(); renderSetlistMain(); }

// ── SETLIST MAIN ──
function renderSetlistMain() {
  const main=document.getElementById('mainArea');

  if(!sl){main.innerHTML=`<div class="empty-state"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><div>Izaberi setlistu ili dodaj novu</div></div>`;return;}

function renameSetlist(id,name) {

}
function removeFromSetlist(idx) {
  const sl=setlists.find(s=>s.id===activeSetlistId);
  sl.entries.splice(idx,1); renderSetlistSidebar(); renderSetlistMain(); saveToStorage();
}
function cycleSetlistTonality(idx) {
  const sl=setlists.find(s=>s.id===activeSetlistId), entry=sl.entries[idx];
  const song=songs.find(s=>s.id===entry.songId);
  const ti=song.tonalities.findIndex(t=>t.id===entry.tonalityId);
  entry.tonalityId=song.tonalities[(ti+1)%song.tonalities.length].id;

}

// ── DRAG & DROP ──
function slDragStart(e,idx){slDragIdx=idx;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function slDragOver(e,idx){e.preventDefault();document.querySelectorAll('.setlist-song-row').forEach(r=>r.classList.remove('drag-over'));e.currentTarget.classList.add('drag-over');}

function slDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.setlist-song-row').forEach(r=>r.classList.remove('drag-over'));}
function slDrop(e,toIdx){

  const sl=setlists.find(s=>s.id===activeSetlistId);

function fsNavPrev(){const sl=setlists.find(s=>s.id===activeSetlistId);if(!sl||fsSetlistIdx<=0)return;fsSetlistIdx--;loadFsSong(sl,fsSetlistIdx);}
function fsNavNext(){const sl=setlists.find(s=>s.id===activeSetlistId);if(!sl||fsSetlistIdx>=sl.entries.length-1)return;fsSetlistIdx++;loadFsSong(sl,fsSetlistIdx);}

// ── TONALITY ──
function setTonality(songId,tonIdx){const song=songs.find(s=>s.id===songId);song.activeTonality=song.tonalities[tonIdx].id;saveToStorage();renderMain();}
function deleteTonality(songId,tonIdx,e){
  e.stopPropagation(); const song=songs.find(s=>s.id===songId);
  if(song.tonalities.length<=1){showToast('⚠ Ne možeš obrisati jedini tonalitet!');return;}
  const wasActive=song.activeTonality===song.tonalities[tonIdx].id;
  song.tonalities.splice(tonIdx,1);
  if(wasActive) song.activeTonality=song.tonalities[0].id;
  snapshot(); renderMain();
}
function refreshFromOriginal(songId,tonIdx,e){
  e.stopPropagation(); const song=songs.find(s=>s.id===songId), ton=song.tonalities[tonIdx], orig=song.tonalities[0];
  const input=prompt(`Polutona za "${ton.name}"?`,ton.transposeOffset||0); if(input===null) return;
  const offset=parseInt(input); if(isNaN(offset)){showToast('⚠ Upiši broj!');return;}
  const nc={}; for(const[k,c] of Object.entries(orig.chords)) nc[k]=offset?transposeChord(c,offset):c;
  ton.chords=nc; ton.transposeOffset=0; song.activeTonality=ton.id;
  snapshot(); renderMain(); showToast(`↻ "${ton.name}" osvežen (${offset>0?'+':''}${offset})`,'green');
}

// ── TONALITY MODAL ──
function openAddTonalityModal(songId){
  addTonalitySongId=songId; tonModalSource='empty'; tonModalSemitones=0;
  ['tonModalName','tonFromNote','tonToNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('tonModalSemiDisplay').textContent='0';
  document.getElementById('tonModalNoteHint').textContent='';
  document.getElementById('noteTransposeResult').textContent='';
  document.getElementById('tonSemitonesRow').style.display='none';
  document.getElementById('tonNoteRow').style.display='none';
  document.getElementById('srcBtnEmpty').classList.add('active');
  document.getElementById('srcBtnSemi').classList.remove('active');
  document.getElementById('srcBtnNote').classList.remove('active');
  document.getElementById('tonModalOverlay').style.display='flex';
  setTimeout(()=>document.getElementById('tonModalName').focus(),50);
}
function selectTonSource(src){
  tonModalSource=src;
  ['empty','semi','note'].forEach(s=>document.getElementById('srcBtn'+s[0].toUpperCase()+s.slice(1)).classList.toggle('active',s===src));
  document.getElementById('tonSemitonesRow').style.display=src==='semi'?'block':'none';
  document.getElementById('tonNoteRow').style.display=src==='note'?'block':'none';
  if(src==='note') setTimeout(()=>document.getElementById('tonFromNote').focus(),50);
  updateTonModalHint();
}
function tonModalSemi(delta){
  tonModalSemitones=Math.max(-11,Math.min(11,tonModalSemitones+delta));
  document.getElementById('tonModalSemiDisplay').textContent=(tonModalSemitones>0?'+':'')+tonModalSemitones;
  updateTonModalHint();
}
function updateTonModalHint(){
  const hint=document.getElementById('tonModalNoteHint'); if(!hint) return;
  hint.textContent=tonModalSemitones?`(npr. Am → ${transposeChord('Am',tonModalSemitones)})`:'';
}
function updateNoteTranspose(){
  const from=document.getElementById('tonFromNote').value.trim(), to=document.getElementById('tonToNote').value.trim();
  const res=document.getElementById('noteTransposeResult');
  if(!from||!to){res.textContent='';return;}
  const nf=from[0].toUpperCase()+from.slice(1), nt=to[0].toUpperCase()+to.slice(1);
  const rf=parseRootNote(nf), rt=parseRootNote(nt);
  const if2=rf?noteIdx(rf):-1, it=rt?noteIdx(rt):-1;
  if(if2===-1){res.textContent=`⚠ Nota "${nf}" nije prepoznata`;res.style.color='var(--danger)';return;}
  if(it===-1){res.textContent=`⚠ Nota "${nt}" nije prepoznata`;res.style.color='var(--danger)';return;}
  tonModalSemitones=((it-if2)%12+12)%12;
  const song=songs.find(s=>s.id===addTonalitySongId), orig=song?.tonalities[0];
  const samples=orig?[...new Set(Object.values(orig.chords))].slice(0,4):['Am','Dm','G'];
  res.textContent=`+${tonModalSemitones} polutona  |  ${samples.map(c=>`${c}→${transposeChord(c,tonModalSemitones)}`).join('  ')}`;
  res.style.color='var(--accent)';
}
function confirmAddTonality(){
  const name=document.getElementById('tonModalName').value.trim(); if(!name){document.getElementById('tonModalName').focus();return;}
  if(tonModalSource==='note'){
    const from=document.getElementById('tonFromNote').value.trim(), to=document.getElementById('tonToNote').value.trim();
    if(!from||!to){showToast('⚠ Upiši obe note!');return;}
    const nf=from[0].toUpperCase()+from.slice(1), nt=to[0].toUpperCase()+to.slice(1);
    const rf=parseRootNote(nf), rt=parseRootNote(nt);
    if(!rf||!rt||noteIdx(rf)===-1||noteIdx(rt)===-1){showToast('⚠ Nota nije prepoznata!');return;}
    tonModalSemitones=((noteIdx(rt)-noteIdx(rf))%12+12)%12;
  }
  const song=songs.find(s=>s.id===addTonalitySongId), newId=Date.now();
  let newChords={};
  if(tonModalSource!=='empty'){
    const orig=song.tonalities[0];
    for(const[k,c] of Object.entries(orig.chords)) newChords[k]=tonModalSemitones?transposeChord(c,tonModalSemitones):c;
  }
  song.tonalities.push({id:newId,name,chords:newChords,transposeOffset:0});
  song.activeTonality=newId; snapshot(); hideTonModal(); renderMain();
  const lbl=tonModalSource==='empty'?'prazno':tonModalSource==='note'?`${document.getElementById('tonFromNote').value.trim()}→${document.getElementById('tonToNote').value.trim()}`:`${tonModalSemitones>0?'+':''}${tonModalSemitones} polutona`;
  showToast(`✓ "${name}" dodat (${lbl})`,'green');
}
function hideTonModal(){document.getElementById('tonModalOverlay').style.display='none';}
function closeTonModal(e){if(e.target===document.getElementById('tonModalOverlay'))hideTonModal();}

// ── SONG CRUD ──
function openAddSongModal(){
  showModal('Nova pesma','Naziv pesme...',()=>{
    const name=document.getElementById('modalInput').value.trim(); if(!name) return;
    const id=Date.now(), tonId=id+1;
    songs.push({id,name,tonalities:[{id:tonId,name:'Original',chords:{}}],activeTonality:tonId,text:'Upiši tekst pesme ovde\nSvaku strofu u novom redu\n\nRazdvoji strofe praznim redom'});
    activeSongId=id; editMode='text'; snapshot(); hideModal(); renderSidebar(); renderMain();
  });
}
function renameSong(id,name){
  const song=songs.find(s=>s.id===id);
  if(name.trim()&&name.trim()!==song.name){song.name=name.trim();snapshot();renderSidebar();}
}
function deleteSong(id,e){
  e.stopPropagation(); if(!confirm('Obrisati pesmu?')) return;
  songs=songs.filter(s=>s.id!==id);
  if(activeSongId===id) activeSongId=songs[0]?.id||null;
  snapshot(); renderSidebar(); renderMain();
}
function saveText(id){
  const song=songs.find(s=>s.id===id);
  song.text=document.getElementById('rawTextarea').value;
  song.tonalities.forEach(t=>t.chords={}); editMode='chords';
  snapshot(); showToast('✓ Tekst sačuvan','green'); renderMain();
}
function setMode(m){editMode=m;renderMain();}

// ── MODAL ──
function showModal(title,placeholder,cb){
  _modalCallback=cb;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalInput').placeholder=placeholder;
  document.getElementById('modalInput').value='';
  document.getElementById('modalOverlay').style.display='flex';
  document.getElementById('modalOkBtn').onclick=cb;
  setTimeout(()=>document.getElementById('modalInput').focus(),50);
}
function hideModal(){document.getElementById('modalOverlay').style.display='none';}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))hideModal();}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();return;}
  const fsActive=document.getElementById('fsOverlay').classList.contains('active');
  if(fsActive){
    if(e.key==='Escape'){closeFullscreen();return;}
    if(e.key===' '){e.preventDefault();toggleAutoScroll();return;}
    if(e.key==='ArrowUp'){document.getElementById('fsContent').scrollBy(0,-80);return;}
    if(e.key==='ArrowDown'){document.getElementById('fsContent').scrollBy(0,80);return;}
    if(e.key==='ArrowLeft'&&fsSetlistMode){e.preventDefault();fsNavPrev();return;}
    if(e.key==='ArrowRight'&&fsSetlistMode){e.preventDefault();fsNavNext();return;}
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='f'&&!fsActive){e.preventDefault();document.getElementById('searchInput').focus();document.getElementById('searchInput').select();return;}
  if(!fsActive&&e.key==='f'&&!e.ctrlKey&&!e.metaKey&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){enterFullscreen();return;}
  if(document.activeElement===document.getElementById('searchInput')&&e.key==='Escape'){clearSearch();return;}
  if(document.getElementById('chordPopup').style.display!=='none'){
    if(e.key==='Enter') setChord();
    if(e.key==='Escape') hideChordPopup();
  }
  if(document.getElementById('modalOverlay').style.display!=='none'){
    if(e.key==='Enter'&&_modalCallback) _modalCallback();
    if(e.key==='Escape') hideModal();
  }
  if(document.getElementById('tonModalOverlay').style.display!=='none'){
    if(e.key==='Enter') confirmAddTonality();
    if(e.key==='Escape') hideTonModal();
  }
});
document.addEventListener('click',e=>{
  const popup=document.getElementById('chordPopup');
  if(popup.style.display!=='none'&&!popup.contains(e.target)) hideChordPopup();
});

// ── INIT ──
const loaded=loadFromStorage();
if(!loaded){
  songs[0].tonalities[0].chords={'0_0':'Am','0_2':'Dm','0_3':'E','1_0':'Am','1_3':'G','2_0':'Am','2_2':'Dm','2_3':'E','4_0':'Am','4_2':'F','4_3':'G','5_0':'E'};
}
snapshot(); updateUndoRedoBtns(); renderSidebar();
if(activeSongId&&songs.find(s=>s.id===activeSongId)) selectSong(activeSongId);
else if(songs.length) selectSong(songs[0].id);
</script>
